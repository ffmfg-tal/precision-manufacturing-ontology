# Relationship graph for the precision-manufacturing-ontology
# Generated: 2026-04-22 (coherence pass, Task 8)
# Updated: 2026-04-24 (Phase 2 + InspectAI additions — 41 new entities;
#   edges extracted from schemas/process_engineering.yaml, tool_room.yaml,
#   packaging.yaml, change_management.yaml, assembly_hardware.yaml,
#   operator_qualification.yaml, assembly.yaml, inspection.yaml,
#   characteristic.yaml, measurement_result.yaml, quality_tools.yaml)
# Updated: 2026-04-26 (AS9100D QMS layer — 9 new entities; 31 new edges;
#   edges extracted from schemas/orders.yaml, schemas/corrective_action.yaml,
#   and field additions to schemas/inspection.yaml, schemas/quality.yaml,
#   schemas/customer_purchase_order.yaml)
#
# Machine-readable enumeration of every edge in the ontology. Consumed by
# agent traversal, graph visualization, and downstream deepening tasks.
#
# Total edges: 386 (355 prior + 31 added 2026-04-26)
#
# Extraction sources (see 'source' field values):
#   - archetype_a / archetype_b / archetype_c: edges derived from the
#     decomposition trees in reference/composition-archetypes.md
#   - schemas/material.yaml: edges from explicit `relationships:` blocks
#   - extensions/<doc>.md: edges from YAML schema ref fields and prose in
#     extensions/material-certs.md, outside-processing.md, quality-flowdowns.md,
#     supplier-approval.md, uuid-discipline.md, ip-boundary.md
#   - reference/domain-map.md: edges explicit in the domain-map prose
#   - schemas/process_engineering.yaml, tool_room.yaml, packaging.yaml,
#     change_management.yaml, assembly_hardware.yaml, operator_qualification.yaml,
#     assembly.yaml, inspection.yaml, characteristic.yaml, measurement_result.yaml,
#     quality_tools.yaml: Phase 2 + InspectAI entity relationship blocks
#
# Deduplication: identical (from, to, verb) triples are merged; their
# sources are unioned. Inverse edges (e.g., `certifies` vs `certified_by`)
# are NOT emitted separately; the edge is stored in the direction it was
# first expressed (typically the archetype tree).
#
# Entity names: snake_case, matching reference/entity-inventory.yaml.
#
# Cardinality values: one-to-one | one-to-many | many-to-one | many-to-many

