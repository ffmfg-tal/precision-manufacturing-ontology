    has_schema: null
    notes: "Referenced only by uuid link from FAI Form 3 characteristic measurements. No standalone schema or narrative definition. Candidate for a dedicated metrology extension or deletion if calibration tracking lives solely in the production system with no schema obligation."

  - name: certification_document
