    notes: "Characteristic Accountability. QIF covers this form; Form 2 and Form 1 are outside QIF scope. Embedded as as9102_form_3 sub-object inside first_article_inspection in schemas/quality.yaml. No independent UUID."

  - name: assembly
    archetypes_used_in: [C]
