    notes: "Distinct entity from routing in schemas/routing.yaml (Phase 2.C). assembly_routing is the process plan template for assembly operations; it adds torque_spec_ref, required_witnesses, and assembly-specific fields that do not apply to machining routings."

  - name: bom_line
