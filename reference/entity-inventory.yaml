# Entity Inventory for the precision-manufacturing-ontology
# Generated: 2026-04-22 (coherence pass, Task 5)
# Updated: 2026-04-22 (Phase 3.2 matrix regen — has_schema fields and notes updated for all Phase 2.A–2.F schemas)
# Source: reference/composition-archetypes.md + extensions/*.md + reference/domain-map.md + schemas/*.yaml
#
# Purpose: machine-readable union of every entity the ontology touches. Feeds the
# entity matrix (Task 6), INDEX.md (Task 7), and relationship graph (Task 8).
#
# Naming convention:
#   Entries use snake_case to match schemas/. Archetype display names
#   are title-case in brackets (e.g., [Material Specification]); they are resolved
#   to snake_case here. Aliases and merges are recorded in notes.
#
# Field conventions:
#   - archetypes_used_in: list of [A, B, C] letters, or "none" for entities defined
#     in extensions/schemas/domain-map that are not exercised by any archetype.
#   - existing_definitions: files where the entity is currently referenced or defined;
#     inline comments narrow to section/paragraph where useful. An empty list is the
#     signal that no prose or schema definition exists yet.
#   - has_schema: path to the canonical YAML schema file. Inline comments distinguish
#     standalone schemas, embedded sub-objects, and alias discriminator values.
#     null only for entities that are validated strings/enums, removed from canon,
#     or genuinely have no schema (deferred to a future cluster).
#   - notes: interpretation decisions, alias resolutions, phase-of-authoring notes.
#
# Entries sorted alphabetically by name.
# Entity count: 82 (original 80 + work_order Phase 2.C + receipt Phase 2.E; two entries
#   renamed: approved_vendor_list_entry → approved_supplier_list_entry,
#   vendor_qualification_event → supplier_qualification_event).

inventory:

  - name: approved_supplier_list_entry
    archetypes_used_in: [B]
    existing_definitions:
      - schemas/approved_supplier_list_entry.yaml  # canonical schema (Phase 2.E)
      - extensions/supplier-approval.md  # prose narrative
      - reference/composition-archetypes.md  # Archetype B: "[Supplier Approval]" node = AVL entry for Acme HT / Sierra Passivation
    has_schema: schemas/approved_supplier_list_entry.yaml
    notes: "Renamed from approved_vendor_list_entry per Decision 1.3. The ASL entry is the structured approval record; supplier is the contact/address record. Archetype B display name [Supplier Approval] is an alias pointing to this entity."

  - name: as9102_form_1
