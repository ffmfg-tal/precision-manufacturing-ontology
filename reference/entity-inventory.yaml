      - extensions/quality-flowdowns.md  # quality_clause.customer_id, quality_flowdown_plan.customer_id
      - extensions/supplier-approval.md  # customer_asl.customer_id, customer_approvals[].customer_id
      - reference/domain-map.md  # Section 6 — Sales and Quoting mentions customers
    has_schema: schemas/customer.yaml
    notes: "Persistent customer record with ITAR screening, DoD prime flag, DFARS flag, and customer_asl references. Schema: schemas/customer.yaml (Phase 2.E)."

  - name: customer_approval
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/customer_approval.yaml  # canonical schema (Phase 2.B)
      - reference/composition-archetypes.md  # all archetypes: has_approval_state → [Customer Approval]
      - reference/domain-map.md  # Section 2 — Parts and Structures mentions approval status
    has_schema: schemas/customer_approval.yaml
    notes: "Records whether the manufacturer is an approved source for a given part number + revision per customer. Carries approval_status and fai_status enums; qualification_method field. Schema: schemas/customer_approval.yaml (Phase 2.B)."

  - name: customer_asl
    archetypes_used_in: none
    existing_definitions:
