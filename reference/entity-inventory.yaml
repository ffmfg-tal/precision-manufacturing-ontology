    has_schema: schemas/customer_asl.yaml
    notes: "Customer's Approved Source List document. Distinct from approved_supplier_list_entry (the manufacturer's per-vendor record). Entries link via supplier_id → supplier.id per Decision 1.3. Schema: schemas/customer_asl.yaml (Phase 2.E)."

  - name: customer_purchase_order
    archetypes_used_in: [B, C]
    existing_definitions:
      - schemas/customer_purchase_order.yaml  # canonical schema (Phase 2.E)
      - reference/composition-archetypes.md  # Archetype B and C: [Customer Purchase Order] in flowdown origin chain
      - extensions/quality-flowdowns.md  # 'CUSTOMER PURCHASE ORDER (X12 850)' top of flowdown cascade
      - extensions/ip-boundary.md  # X12 850 section
    has_schema: schemas/customer_purchase_order.yaml
    notes: "Inbound X12 850 from customer. Kept distinct per Decision 1.4; it is the origin of the quality flowdown cascade. State machine from Received through Closed. Schema: schemas/customer_purchase_order.yaml (Phase 2.E)."

  - name: cutter_definition
    archetypes_used_in: none
    existing_definitions:
      - schemas/tool_room.yaml  # canonical schema (Phase 2 tool room)
      - extensions/tool-room.md  # prose narrative
    has_schema: schemas/tool_room.yaml
    notes: "Catalog entry (not a physical item) for a cutter type — manufacturer, part number, geometry, material, coating. Cutters are consumable and not individually serialized by default; consumption is tracked via tool_life_record. One cutter_definition may correspond to many physical cutters consumed over time. Schema: schemas/tool_room.yaml (Phase 2)."

  - name: data_classification
    archetypes_used_in: none
    existing_definitions:
      - schemas/data_classification.yaml  # canonical schema (Phase 2.F)
      - extensions/ip-boundary.md  # 'Data Classification Matrix' section
      - reference/domain-map.md  # Section 8 — Compliance and Governance
    has_schema: schemas/data_classification.yaml
    notes: "Reference entity implementing the ip-boundary.md Data Classification Matrix. classification_level enum; storage/transmission rules; ITAR flag; access_roles[]; retention_years. Applied to other entities by reference. Schema: schemas/data_classification.yaml (Phase 2.F)."

  - name: deviation_waiver
    archetypes_used_in: none
    existing_definitions:
      - schemas/change_management.yaml  # canonical schema (Phase 2 change management)
      - extensions/change-management.md  # prose narrative
    has_schema: schemas/change_management.yaml
    notes: "Customer or DER authorization document permitting nonconforming material use. document_type enum: Deviation (pre-production authorization) or Waiver (post-production acceptance). approved_by is a free-text string (external authority — customer name/title or DER certificate number). A waiver references an NCR. AS9100 §8.7.1 compliance record. Schema: schemas/change_management.yaml (Phase 2)."

  - name: dfars_declaration
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/certification_document.yaml  # alias — cert_type: DFARS_Declaration
      - reference/composition-archetypes.md  # all archetypes: certification_document DFARS Declaration
      - extensions/material-certs.md  # certification_document cert_type DFARS_Declaration + dfars_fields sub-schema
      - extensions/quality-flowdowns.md  # QA-008 DFARS specialty metals clause
      - extensions/ip-boundary.md  # record retention table
    has_schema: schemas/certification_document.yaml  # alias — cert_type: DFARS_Declaration
    notes: "Alias of certification_document (cert_type: DFARS_Declaration) per Decision 1.6. dfars_fields sub-schema within schemas/certification_document.yaml. No standalone schema."

  - name: export_classification
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/export_classification.yaml  # canonical schema (Phase 2.B)
      - reference/composition-archetypes.md  # all archetypes: has_classification edge
      - extensions/ip-boundary.md  # ITAR Data Handling
      - reference/domain-map.md  # Section 6 and 8
    has_schema: schemas/export_classification.yaml
    notes: "ITAR/EAR classification record per part or assembly. Carries ECCN, USML category, exemptions. Distinct from data_classification (internal storage governance). Schema: schemas/export_classification.yaml (Phase 2.B)."

  - name: export_compliance_declaration
    archetypes_used_in: [B, C]
    existing_definitions:
      - schemas/certification_document.yaml  # alias — cert_type: ExportCompliance
      - reference/composition-archetypes.md  # Archetype B and C: ITAR / USML declaration in cert package
      - extensions/ip-boundary.md  # ITAR data handling rules
    has_schema: schemas/certification_document.yaml  # alias — cert_type: ExportCompliance
    notes: "Alias of certification_document (cert_type: ExportCompliance) per Decision 1.6. export_compliance_fields sub-schema within schemas/certification_document.yaml. No standalone schema."

  - name: engineering_change_notice
    archetypes_used_in: none
    existing_definitions:
      - schemas/change_management.yaml  # canonical schema (Phase 2 change management)
      - extensions/change-management.md  # prose narrative
    has_schema: schemas/change_management.yaml
    notes: "Authorizes a change to a part number's drawing revision, routing version, material, process, or governing specification. Carries old/new part_specification_id and routing_id FKs. Does not model cascade logic (revision creation, in-flight job evaluation) — those are production system operations the ECN authorizes. AS9100 §8.3.6 compliance record. Schema: schemas/change_management.yaml (Phase 2)."

  - name: fai_form_1_header
    archetypes_used_in: [B, C]
    existing_definitions:
      - reference/composition-archetypes.md  # Archetype B and C: records → [FAI Form 1 Header]
      - extensions/quality-flowdowns.md  # first_article_inspection.form1 structured fields (org name, CAGE, drawing, etc.)
    has_schema: null
    notes: "The header fields of FAI Form 1 (part identity, supplier identity, FAI report number, CAGE, drawing, design activity). Embedded as a structured sub-object inside as9102_form_1 in quality-flowdowns.md. Archetypes treat as first-class node. Matrix may collapse into as9102_form_1."

  - name: fai_package
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - reference/composition-archetypes.md  # all archetypes: cert_package contains FAI Package
    has_schema: null
    notes: "Bundle of the three AS9102 forms as a single packaged artifact. Distinct from first_article_inspection which is the logical FAI record. A FAI package is the transmitted-to-customer form."

  - name: fastener
    archetypes_used_in: [C]
    existing_definitions:
      - schemas/part.yaml  # alias — part_kind: fastener
      - reference/composition-archetypes.md  # Archetype C: OP-A020 uses_fastener → [Fastener]
    has_schema: schemas/part.yaml  # alias — part_kind: fastener
    notes: "Alias per Decision 1.2. Canonical form is part with part_kind: fastener. part_kind enum in schemas/part.yaml (Phase 2.B)."

  - name: first_article_inspection
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/quality.yaml  # canonical schema (Phase 2.D)
      - reference/composition-archetypes.md  # all archetypes: inspected_under edge
      - extensions/quality-flowdowns.md  # prose narrative
      - reference/domain-map.md  # Section 4 — Quality
    has_schema: schemas/quality.yaml
    notes: "AS9102 Rev C three-form FAI record. as9102_form_1/2/3 embedded as sub-objects with no independent UUIDs. subject_id/subject_type polymorphic FK per Decision 1.9. Schema: schemas/quality.yaml (Phase 2.D)."

  - name: fixture_use
    archetypes_used_in: none
    existing_definitions:
      - schemas/process_engineering.yaml  # canonical schema (Phase 2.A process engineering)
      - extensions/process-engineering-nre.md  # prose narrative
    has_schema: schemas/process_engineering.yaml
    notes: "Join entity linking a routing operation to a fixture part. Fixtures are part entities with part_kind: fixture (not a separate entity class). required flag distinguishes mandatory fixtures from alternatives. One operation may have multiple fixture_use records (primary workholding, secondary clamp, etc.). Schema: schemas/process_engineering.yaml (Phase 2.A)."

  - name: fmea_item
    archetypes_used_in: none
    existing_definitions:
      - schemas/quality_tools.yaml  # canonical schema (InspectAI-derived)
    has_schema: schemas/quality_tools.yaml
    notes: "Single row in a PFMEA or DFMEA per AIAG FMEA 4th Edition. Carries severity/occurrence/detection ratings and RPN (S × O × D); includes revised ratings after corrective actions. References part.id. InspectAI owns FMEA workflow; ontology references by FK from control plans and PPAP submissions. Schema: schemas/quality_tools.yaml (InspectAI-derived)."

  - name: gauge_definition
    archetypes_used_in: none
    existing_definitions:
      - schemas/tool_room.yaml  # canonical schema (Phase 2 tool room)
      - extensions/tool-room.md  # prose narrative
    has_schema: schemas/tool_room.yaml
    notes: "Catalog entry for a gauge type (presetter model, caliper model, CMM probe type). Defines what a gauge IS — manufacturer, model, measurement range, default calibration interval. Physical calibrated instruments are tool_gauge records in schemas/inspection.yaml. Relationship between gauge_definition and tool_gauge is currently implicit; a future FK migration may make it explicit. Schema: schemas/tool_room.yaml (Phase 2)."

  - name: heat_number
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - reference/composition-archetypes.md  # all archetypes: has_heat edge on material_lot
      - extensions/material-certs.md  # material_lot.heat_number string attribute; MTR mtr_fields.heat_number
      - schemas/material.yaml  # material_lot.heat_number (required string)
    has_schema: null
    notes: "Validated string attribute per Decision 1.7. Canonical form: material_lot.heat_number (required string). Additional heat data (mill source, melt date, chemistry actuals) lives on material_lot and mtr cert document. Not a first-class entity; archetype display node [Heat Number] is a string field reference. No schema."

  - name: holder_definition
    archetypes_used_in: none
    existing_definitions:
      - schemas/tool_room.yaml  # canonical schema (Phase 2 tool room)
      - extensions/tool-room.md  # prose narrative
    has_schema: schemas/tool_room.yaml
    notes: "Catalog entry for a holder type — holder style, taper standard (CAT40, HSK63A, BT40, etc.), and bore size. Physical holders are serialized parts with part_kind: fixture in schemas/part.yaml; holder_definition is the spec those parts conform to. One holder_definition may correspond to many serialized holder parts tracked via tool_room_allocation. Schema: schemas/tool_room.yaml (Phase 2)."

  - name: insert_installation_record
    archetypes_used_in: none
    existing_definitions:
      - schemas/assembly_hardware.yaml  # canonical schema (Phase 2 assembly hardware)
      - extensions/change-management.md  # prose narrative (assembly hardware context)
    has_schema: schemas/assembly_hardware.yaml
    notes: "Execution record for installing threaded inserts (helicoils, keenserts, nutplates) into a parent part. Records hole designation, installation torque, and tang breakoff confirmation for helicoil-type inserts. Tied to assembly_operation with operation_code INSERT. Immutable after inspector sign-off. Schema: schemas/assembly_hardware.yaml (Phase 2)."

  - name: inspection_event
    archetypes_used_in: none
    existing_definitions:
      - schemas/inspection.yaml  # canonical schema (Phase 2 inspection extensions)
      - extensions/inspection-calibration.md  # prose narrative
      - extensions/uuid-discipline.md  # entity table: 'Inspection Event' with UUID assignment rule
    has_schema: schemas/inspection.yaml
    notes: "Lightweight UUID envelope for a bounded inspection session — bundles QIF results, pmi_events, and attachments from one inspector/job/unit into a single parent FK. Does not replicate measurement data; terminal when the session is saved (no approval gates). Schema added Phase 2.C: schemas/inspection.yaml."

  - name: inspection_plan
    archetypes_used_in: none
    existing_definitions:
      - schemas/process_engineering.yaml  # canonical schema (Phase 2.A process engineering)
