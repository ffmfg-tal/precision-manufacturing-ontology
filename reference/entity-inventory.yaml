    notes: "Distinct entity per Decision 1.1. Assembly has its own FAI, cert package, serial number, and shipment. composed_of edge targets bom_line[]. part and assembly share no common parent type in Layer 2 (no item supertype per Decision 1.9). Schema: schemas/part.yaml (Phase 2.B)."

  - name: assembly_operation
