# Entity Inventory for the precision-manufacturing-ontology
# Generated: 2026-04-22 (coherence pass, Task 5)
# Updated: 2026-04-24 (Phase 2 additions — 29 new entries; 9 stale has_schema fixes; InspectAI entities added)
# Source: reference/composition-archetypes.md + extensions/*.md + reference/domain-map.md + schemas/*.yaml
#
# Purpose: machine-readable union of every entity the ontology touches. Feeds the
# entity matrix (Task 6), INDEX.md (Task 7), and relationship graph (Task 8).
#
# Naming convention:
#   Entries use snake_case to match schemas/. Archetype display names
#   are title-case in brackets (e.g., [Material Specification]); they are resolved
#   to snake_case here. Aliases and merges are recorded in notes.
#
# Field conventions:
#   - archetypes_used_in: list of [A, B, C] letters, or "none" for entities defined
#     in extensions/schemas/domain-map that are not exercised by any archetype.
#   - existing_definitions: files where the entity is currently referenced or defined;
#     inline comments narrow to section/paragraph where useful. An empty list is the
#     signal that no prose or schema definition exists yet.
#   - has_schema: path to the canonical YAML schema file. Inline comments distinguish
#     standalone schemas, embedded sub-objects, and alias discriminator values.
#     null only for entities that are validated strings/enums, removed from canon,
#     or genuinely have no schema (deferred to a future cluster).
#   - notes: interpretation decisions, alias resolutions, phase-of-authoring notes.
#
# Entries sorted alphabetically by name.
# Entity count: 117 (82 original + 29 Phase 2 additions (process engineering, tool room,
#   packaging, change management, assembly hardware, assembly, inspection extensions) +
#   6 InspectAI-derived additions: characteristic, measurement_result, fmea_item,
#   control_plan_item, spc_result, ppap_submission).

inventory:

  - name: approved_supplier_list_entry
    archetypes_used_in: [B]
    existing_definitions:
      - schemas/approved_supplier_list_entry.yaml  # canonical schema (Phase 2.E)
      - extensions/supplier-approval.md  # prose narrative
      - reference/composition-archetypes.md  # Archetype B: "[Supplier Approval]" node = AVL entry for Acme HT / Sierra Passivation
    has_schema: schemas/approved_supplier_list_entry.yaml
    notes: "Renamed from approved_vendor_list_entry per Decision 1.3. The ASL entry is the structured approval record; supplier is the contact/address record. Archetype B display name [Supplier Approval] is an alias pointing to this entity."

  - name: as9102_form_1
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/quality.yaml  # embedded sub-object in first_article_inspection
      - reference/composition-archetypes.md  # all three archetypes
      - extensions/quality-flowdowns.md  # first_article_inspection.form1 nested schema
    has_schema: schemas/quality.yaml  # embedded in first_article_inspection
    notes: "Part Number Accountability form. Embedded as as9102_form_1 sub-object inside first_article_inspection in schemas/quality.yaml. No independent UUID."

  - name: as9102_form_2
    archetypes_used_in: [B, C]
    existing_definitions:
      - schemas/quality.yaml  # embedded sub-object in first_article_inspection
      - reference/composition-archetypes.md  # Archetype B and C
      - extensions/quality-flowdowns.md  # first_article_inspection.form2 nested schema
    has_schema: schemas/quality.yaml  # embedded in first_article_inspection
    notes: "Product Accountability (materials and processes). Out of scope for Archetype A. Embedded as as9102_form_2 sub-object inside first_article_inspection in schemas/quality.yaml. No independent UUID."

  - name: as9102_form_3
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/quality.yaml  # embedded sub-object in first_article_inspection
      - reference/composition-archetypes.md  # all three archetypes
      - extensions/quality-flowdowns.md  # first_article_inspection.form3 nested schema
    has_schema: schemas/quality.yaml  # embedded in first_article_inspection
    notes: "Characteristic Accountability. QIF covers this form; Form 2 and Form 1 are outside QIF scope. Embedded as as9102_form_3 sub-object inside first_article_inspection in schemas/quality.yaml. No independent UUID."

  - name: assembly
    archetypes_used_in: [C]
    existing_definitions:
      - schemas/part.yaml  # canonical schema (Phase 2.B)
      - reference/composition-archetypes.md  # Archetype C introduces as distinct entity; section 'Framing choice'
    has_schema: schemas/part.yaml
    notes: "Distinct entity per Decision 1.1. Assembly has its own FAI, cert package, serial number, and shipment. composed_of edge targets bom_line[]. part and assembly share no common parent type in Layer 2 (no item supertype per Decision 1.9). Schema: schemas/part.yaml (Phase 2.B)."

  - name: assembly_operation
    archetypes_used_in: [C]
    existing_definitions:
      - schemas/routing.yaml  # canonical schema (Phase 2.C)
      - reference/composition-archetypes.md  # Archetype C: OP-A010/A020/A030
    has_schema: schemas/routing.yaml
    notes: "Distinct subtype of operation in schemas/routing.yaml (Phase 2.C). Extends operation with torque control, fastener reference, witness inspection, and bolt-up step attributes. assembly_operation is not a parent-type of operation; it extends operation for assembly contexts."

  - name: assembly_routing
    archetypes_used_in: [C]
    existing_definitions:
      - schemas/routing.yaml  # canonical schema (Phase 2.C)
      - reference/composition-archetypes.md  # Archetype C: R-MFG-GMB-BKT-ASSY-012-v1
    has_schema: schemas/routing.yaml
    notes: "Distinct entity from routing in schemas/routing.yaml (Phase 2.C). assembly_routing is the process plan template for assembly operations; it adds torque_spec_ref, required_witnesses, and assembly-specific fields that do not apply to machining routings."

  - name: bom_line
    archetypes_used_in: none
    existing_definitions:
      - schemas/part.yaml  # canonical schema (Phase 2.B)
      - schemas/material.yaml  # material.consumed_by relationship target
    has_schema: schemas/part.yaml
    notes: "Distinct many-to-many edge entity per Decision 1.1. Schema: schemas/part.yaml (Phase 2.B). Carries qty, UOM, find-number, effectivity, and polymorphic parent/child FKs with subject_type discriminators."

  - name: cam_file
    archetypes_used_in: none
    existing_definitions:
      - schemas/process_engineering.yaml  # canonical schema (Phase 2.A process engineering)
      - extensions/process-engineering-nre.md  # prose narrative
    has_schema: schemas/process_engineering.yaml
    notes: "CAM project file that is the engineering source for one or more NC programs. One CAM file posts to multiple nc_program records via different post-processors. Tied to one operation within one nre_package. cam_file.id is optional FK on nc_program for hand-coded programs. Schema: schemas/process_engineering.yaml (Phase 2.A)."

  - name: calibration_record
    archetypes_used_in: none
    existing_definitions:
      - schemas/inspection.yaml  # canonical schema (Phase 2 inspection extensions)
      - extensions/inspection-calibration.md  # prose narrative
      - extensions/quality-flowdowns.md  # FAI form3 characteristics[].equipment_calibration_id
    has_schema: schemas/inspection.yaml
    notes: "Immutable audit record of a single calibration event on a tool or gauge. One record per calibration event; never modified after creation. Lifecycle state (Current/Due_Soon/Overdue/Quarantined) lives on tool_gauge, not this record. Schema added Phase 2.C: schemas/inspection.yaml."

  - name: certification_document
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/certification_document.yaml  # canonical schema (Phase 2.A)
      - extensions/material-certs.md  # prose narrative
      - reference/composition-archetypes.md  # all archetypes: MTR, CoC, DFARS Declaration entries
      - reference/domain-map.md  # Section 1 — Materials
    has_schema: schemas/certification_document.yaml
    notes: "Supertype with cert_type discriminator per Decision 1.6. cert_type enum: MTR | CoC | DFARS_Declaration | PMI_Report | ConflictMineral | ShelfLife | ExportCompliance. Per-cert-type *_fields sub-schemas in schemas/certification_document.yaml (Phase 2.A). Subtype rows are archetype display aliases — no standalone schema files."

  - name: certification_package
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/certification_package.yaml  # canonical schema (Phase 2.F)
      - reference/composition-archetypes.md  # all archetypes: shipment includes_document → [Certification Package]
      - extensions/material-certs.md  # 'CERT PACKAGE' block at bottom of traceability chain
      - extensions/quality-flowdowns.md  # 'CERT PACKAGE (assembled at shipment)' block
      - extensions/ip-boundary.md  # 'Cert Package' section defines what leaves the shop
    has_schema: schemas/certification_package.yaml
    notes: "Nested per Decision 1.9. contains_packages[] holds child certification_package refs (assembly cert contains constituent part cert packages). Schema: schemas/certification_package.yaml (Phase 2.F)."

  - name: characteristic
    archetypes_used_in: none
    existing_definitions:
      - schemas/characteristic.yaml  # canonical schema (InspectAI-derived)
    has_schema: schemas/characteristic.yaml
    notes: "Base drawing callout entity — every dimension, GD&T callout, thread note, surface finish, datum, and note extracted from a part_specification revision. source enum includes AI_Extracted for InspectAI pipeline; is_critical flag elevates to key_characteristic via elevated_as relationship. Not all characteristics become key_characteristics. Schema: schemas/characteristic.yaml (InspectAI-derived)."

  - name: characteristic_measurement
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/quality.yaml  # embedded in as9102_form_3.characteristics[] in first_article_inspection
      - reference/composition-archetypes.md  # all archetypes: QIF results records characteristic measurement
      - extensions/quality-flowdowns.md  # FAI form3.characteristics[] schema
    has_schema: schemas/quality.yaml  # embedded in as9102_form_3.characteristics[]
    notes: "A single measurement of a single characteristic. Carries qif_characteristic_id link, measured value, deviation, pass/fail. Embedded in as9102_form_3.characteristics[] sub-object within first_article_inspection in schemas/quality.yaml."

  - name: cmm_program
    archetypes_used_in: none
    existing_definitions:
      - schemas/process_engineering.yaml  # canonical schema (Phase 2.A process engineering)
      - extensions/process-engineering-nre.md  # prose narrative
    has_schema: schemas/process_engineering.yaml
    notes: "Machine-specific CMM program for an inspection operation. Distinct from inspection_plan (method-agnostic governance document): cmm_program is the machine-executable artifact. cmm_system field captures the CMM software (PC-DMIS, Calypso, etc.). Part of the nre_package. Schema: schemas/process_engineering.yaml (Phase 2.A)."

  - name: coc
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - schemas/certification_document.yaml  # alias — cert_type: CoC
      - reference/composition-archetypes.md  # all archetypes: certification_document for CoC
      - extensions/material-certs.md  # certification_document cert_type enum value CoC
      - extensions/quality-flowdowns.md  # QA-003 Certificate of Conformance required
    has_schema: schemas/certification_document.yaml  # alias — cert_type: CoC
    notes: "Certificate of Conformance. Alias of certification_document (cert_type: CoC) per Decision 1.6. coc_fields sub-schema within schemas/certification_document.yaml. No standalone schemas/coc.yaml."

  - name: conflict_minerals_declaration
    archetypes_used_in: none
    existing_definitions:
      - schemas/certification_document.yaml  # alias — cert_type: ConflictMineral
      - extensions/material-certs.md  # certification_document cert_type enum value ConflictMineral; conflict_mineral_fields sub-schema
      - extensions/quality-flowdowns.md  # QA-009 Conflict Minerals clause
      - schemas/material.yaml  # material_lot.conflict_mineral_status attribute
    has_schema: schemas/certification_document.yaml  # alias — cert_type: ConflictMineral
    notes: "Alias of certification_document (cert_type: ConflictMineral) per Decision 1.6. conflict_mineral_fields sub-schema within schemas/certification_document.yaml. No standalone schema."

  - name: control_plan_item
    archetypes_used_in: none
    existing_definitions:
      - schemas/quality_tools.yaml  # canonical schema (InspectAI-derived)
    has_schema: schemas/quality_tools.yaml
    notes: "Single row in an AIAG APQP control plan. Specifies how one product or process characteristic at one process step is monitored during production — measurement method, sample size, frequency, reaction plan. References characteristic.id. InspectAI owns control plan workflow; ontology references by FK. Schema: schemas/quality_tools.yaml (InspectAI-derived)."

  - name: country
    archetypes_used_in: [A, B, C]
    existing_definitions:
      - reference/composition-archetypes.md  # all archetypes: [Country] US via has_melt_country edge
      - extensions/material-certs.md  # melt_country / manufacture_country fields (string, ISO code)
      - extensions/supplier-approval.md  # DFARS qualifying countries list
      - schemas/material.yaml  # material_lot.melt_country (string, ISO 3166)
    has_schema: null
    notes: "Validated string attribute per Decision 1.7. Canonical form: ISO 3166-1 alpha-2 (e.g., US, DE). DFARS qualifying-countries membership is a reference-list lookup at compliance-check time, not a per-country entity. Not a first-class entity. Archetype display node [Country] is a string field reference on material_lot."

  - name: customer
    archetypes_used_in: none
    existing_definitions:
