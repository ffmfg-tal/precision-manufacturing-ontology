# schemas/measurement_result.yaml
#
# Layer-1 coverage: PARTIAL.
#   QIF (Quality Information Framework) QIFResults module covers dimensional measurement
#   results with a formal schema. MTConnect covers machine-state events but not dimensional
#   measurement results. The manufacturer-layer entity here bridges from QIF's formal schema
#   to the production system's inspection session tracking.
#
# Prose source: extensions/inspection-calibration.md
#
# Architectural decisions:
#   measurement_result is the per-reading execution record. It links to inspection_event
#   (the session envelope), characteristic (the drawing callout being measured), and
#   optionally tool_gauge (the calibrated instrument used). source_type distinguishes
#   CMM-generated, operator-measured, and manually-entered results. setup_number tracks
#   which fixture configuration / workholding setup was active — critical for multi-setup
#   parts where the same characteristic may be checked in different setups.
#
#   pmi_event (schemas/pmi_event.yaml) is a DIFFERENT entity covering Positive Material
#   Identification (XRF/OES alloy chemistry tests). Do NOT confuse the two.
#
# Entities: measurement_result

entities:

  measurement_result:
    description: >
      The dimensional measurement result — one row per sample per characteristic per
      inspection session. Captures the actual measured value (or pass/fail judgment for
      attribute checks), deviation from nominal, conformance status, and full traceability
      to the instrument, operator, machine, and workholding setup that produced the reading.
      Distinct from pmi_event (Positive Material Identification / XRF/OES chemistry testing).
      The parent inspection_event provides the session envelope that bundles all
      measurement_result records, pmi_event records, and attachments from a single
      inspection sitting. source_type is required to distinguish CMM-generated results
      (which carry a machine_id) from operator-measured and manually-entered results.
    attributes:
      id:
        type: uuid
        required: true
        description: UUID v4, minted when the measurement result record is created
      inspection_event_id:
        type: uuid
        required: true
        description: FK → inspection_event.id (defined in schemas/inspection.yaml)
      characteristic_id:
        type: uuid
        required: true
        description: FK → characteristic.id — the drawing callout being measured
      actual_value:
        type: number
        required: false
        description: Measured value; null for pass/fail attribute checks where actual_value_text is used instead
      actual_value_text:
        type: string
        required: false
        description: Text result for attribute or visual checks
        examples: ["Acceptable", "Reject", "Visual OK"]
      deviation:
        type: number
        required: false
        description: actual_value minus nominal (signed; negative deviation means below nominal)
      conformance:
        type: enum
        required: true
        values: [Pass, Fail, Conditional, Pending, NA]
        description: >
          Pass: measurement within tolerance limits.
          Fail: measurement outside tolerance limits; disposition required.
          Conditional: measurement accepted with documented engineering disposition.
          Pending: measurement recorded but conformance determination deferred.
          NA: characteristic not applicable for this unit or setup.
      sample_number:
        type: integer
        required: false
        description: Sample index within the inspection session (1, 2, 3...) for statistical sampling plans
      setup_number:
        type: integer
        required: false
        description: >
          Fixture or workholding setup number (1, 2, 3...) for multi-setup parts.
          Critical for traceability when the same characteristic is checked in different
          setups or re-measured after a setup change.
      source_type:
        type: enum
        required: true
        values: [CMM, Operator, Manual, VisionSystem, AutomatedGauge]
        description: >
          CMM: result generated by a coordinate measuring machine; machine_id should be populated.
          Operator: result measured by an operator using a hand gauge; equipment_id should be populated.
          Manual: result entered manually (e.g., transcribed from paper traveler); treat with care.
          VisionSystem: result captured by an automated vision or optical system.
          AutomatedGauge: result captured by an in-process automated gauging station.
      equipment_id:
        type: uuid
        required: false
        description: FK → tool_gauge.id (defined in schemas/inspection.yaml) — the calibrated instrument used
      equipment_description:
        type: string
        required: false
        description: Free-text instrument description when equipment_id is not populated
        examples: ["Mitutoyo 0-6in caliper", "Starrett 0-1in mic", "CMM Renishaw TP20"]
      machine_id:
        type: uuid
        required: false
        description: FK → work_center.id (defined in schemas/routing.yaml) — the CMM or automated station that produced the measurement
      operator_id:
        type: uuid
        required: false
        description: FK → user.id — operator who took the measurement
      measured_at:
        type: datetime
        required: false
        description: Timestamp of the measurement; populated from CMM output when source_type = CMM
      notes:
        type: string
        required: false

    relationships:
      in_session:
        target: inspection_event
        cardinality: many-to-one
        description: Defined in schemas/inspection.yaml
      for_characteristic:
        target: characteristic
        cardinality: many-to-one
      measured_with:
        target: tool_gauge
        cardinality: many-to-one
        description: Defined in schemas/inspection.yaml
      at_machine:
        target: work_center
        cardinality: many-to-one
        description: Defined in schemas/routing.yaml
      measured_by:
        target: user
        cardinality: many-to-one
