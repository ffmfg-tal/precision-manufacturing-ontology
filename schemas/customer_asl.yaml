# schemas/customer_asl.yaml
#
# Layer-1 coverage: None. Customer Approved Source Lists are customer-maintained documents
#   transmitted as PDFs, portal references, or contract attachments. No Layer-1 standard
#   defines an ASL data structure. AS9100 §8.4 requires documented evaluation; ITAR/DFARS
#   may require specific source selection documentation.
#
# Layer-2 (Manufacturer Extension): customer_asl is the machine-readable representation of a
#   customer's approved processor list. Used during vendor selection for outside process
#   operations when QA-013 is active and the customer has an ASL on file. The relationship
#   between customer_asl and approved_supplier_list_entry's customer_approvals[] is:
#   - customer_asl: the customer's authoritative document (what the customer says)
#   - approved_supplier_list_entry.customer_approvals[]: the manufacturer's verification record per vendor
#   Both must be consistent. customer_asl is the source; the per-vendor record is the derived check.
#
# Open Question OQ-03 (residual-gaps.md): Is customer_asl the customer's view of an ASL
#   or the manufacturer's internal ASL keyed to a customer? Resolved here: customer_asl represents the
#   customer's document (imported or referenced). the manufacturer's own approved vendor list is
#   approved_supplier_list_entry (one record per supplier). The customer_asl.entries[]
#   cross-reference to approved_supplier_list_entry via supplier_id where the supplier
#   is in the manufacturer's system; null supplier_id means not yet matched.
#
# Prose source: extensions/supplier-approval.md (Customer ASL section)
# Cluster: Supply Chain (Phase 2.E)
# Sibling schemas: schemas/supplier.yaml, schemas/approved_supplier_list_entry.yaml

entities:

  customer_asl:
    description: >
      A customer's Approved Source List (ASL) imported or referenced in the the manufacturer system.
      Constrains which suppliers the manufacturer may use for outside process operations covered by
      quality clause QA-013. The ASL is the customer's authoritative document; the manufacturer imports
      it at contract start and updates it when the customer issues revisions.
      Entries in the ASL are cross-referenced to approved_supplier_list_entry records
      via supplier_id where the supplier has been matched in the the manufacturer system.
      Resolves OQ-03: this entity represents the customer's document; the manufacturer's internal
      per-vendor qualification records are in approved_supplier_list_entry.
    attributes:
      id:
        type: uuid
        required: true
        description: UUID v4, minted when ASL document is imported into the production system
      customer_id:
        type: uuid
        required: true
        description: "FK → customer.id — the customer whose ASL this is"
      document_reference:
        type: string
        required: false
        description: Customer's ASL document number, revision, or portal URL
      effective_date:
        type: date
        required: false
        description: Date this ASL document became effective
      expiration_date:
        type: date
        required: false
        description: Date this ASL version expires (if customer issues versioned ASLs)
      source_type:
        type: enum
        required: true
        values: [Customer_Provided_Document, Customer_Portal, Verbal_Confirmation, Contract_Attachment]
        description: >
          How the manufacturer obtained this ASL.
          Customer_Provided_Document = PDF or spreadsheet provided by customer.
          Customer_Portal = verified from customer's online supplier portal.
          Verbal_Confirmation = received by phone/email (lowest confidence).
          Contract_Attachment = attached to PO or quality addendum.
      last_verified_date:
        type: date
        required: false
        description: Date the manufacturer last confirmed this ASL is current with the customer
      file_reference:
        type: string
        required: false
        description: Path or URL to the ASL document PDF stored in the production system
      entries:
        type: array
        required: false
        description: Individual approved supplier entries within this ASL
        items:
          supplier_name:
            type: string
            required: true
            description: Supplier name as listed by the customer
          supplier_cage:
            type: string
            required: false
            description: Supplier CAGE code as listed by the customer
          supplier_id:
            type: uuid
            required: false
            nullable: true
            description: "FK → supplier.id; null if supplier is not yet matched in the manufacturer system"
          approved_scopes:
            type: array
            required: false
            description: Process scopes this supplier is approved for under this ASL
            items:
              process_category:
                type: string
                required: true
                description: "Process category (e.g., 'Heat Treat', 'FPI')"
              process_specs:
                type: array
                required: false
                description: "Specific specs this supplier is approved to run (e.g., ['AMS 2759/3', 'AMS 2770'])"
                items:
                  type: string
              conditions:
                type: array
                required: false
                description: "Specific conditions within the specs (e.g., ['H1025', 'H900'])"
                items:
                  type: string
              material_families:
                type: array
                required: false
                description: "Material families covered (e.g., ['PH Stainless', 'Aluminum'])"
                items:
                  type: string
          notes:
            type: string
            required: false
            description: Customer's notes for this ASL entry (restrictions, requirements)
      notes:
        type: string
        required: false
        description: the manufacturer notes on this ASL document (restrictions, gaps, import issues)

    relationships:
      issued_by_customer:
        target: customer
        cardinality: many-to-one
        description: The customer who maintains this ASL
