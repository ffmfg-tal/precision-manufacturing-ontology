# schemas/supplier_qualification_event.yaml
#
# Layer-1 coverage: None. Supplier qualification audit trails have no Layer-1 standard
#   analog in STEP, QIF, MTConnect, or X12. AS9100 Rev D §8.4 requires documented
#   supplier evaluation and monitoring; it defines the requirement, not the data structure.
#
# Layer-2 (Manufacturer Extension): Audit-trail entity for all supplier approval lifecycle events.
#   Each qualification action — initial approval, annual review, Nadcap update, suspension,
#   reinstatement — produces one record. The event chain on a supplier is the compliance
#   evidence for AS9100 §8.4 supplier evaluation requirements and DFARS vendor qualification.
#   Renamed from vendor_qualification_event per Decision 1.3 (vendor → supplier cascade).
#
# Prose source: extensions/supplier-approval.md (Supplier Qualification Event section)
# Cluster: Supply Chain (Phase 2.E)
# Sibling schemas: schemas/supplier.yaml, schemas/approved_supplier_list_entry.yaml

entities:

  supplier_qualification_event:
    description: >
      A timestamped record of a supplier qualification action. Each action that changes
      the approval state of a supplier (initial approval, annual review, Nadcap update,
      suspension, reinstatement, disqualification) produces one event record. The event
      log on a supplier provides the AS9100 §8.4 audit trail for supplier evaluation and
      monitoring. Renamed from vendor_qualification_event per Decision 1.3.
    attributes:
      id:
        type: uuid
        required: true
        description: UUID v4, minted when the event is recorded in the production system
      supplier_id:
        type: uuid
        required: true
        description: "FK → supplier.id — the supplier this event applies to"
      event_type:
        type: enum
        required: true
        values:
          - Initial_Approval
          - Annual_Review
          - Nadcap_Update
          - Customer_Approval_Added
          - Customer_Approval_Expired
          - Performance_Issue
          - Suspension
          - Reinstatement
          - Disqualification
          - ITAR_Registration_Update
          - Insurance_Update
        description: Category of the qualification action
      event_date:
        type: date
        required: true
        description: Date the qualification action occurred
      performed_by_user_id:
        type: uuid
        required: false
        description: "FK → user.id — the manufacturer quality person who performed the review"
      performed_by:
        type: string
        required: false
        description: Name/title of person performing the review (denormalized for clarity)
      description:
        type: string
        required: true
        description: Narrative description of the action taken and findings
      documents_reviewed:
        type: array
        required: false
        description: List of documents reviewed during this qualification event
        items:
          type: string
          examples:
            - "Nadcap HT certificate (eAuditNet)"
            - "AS9100 Rev D registration certificate"
            - "ITAR DDTC registration confirmation"
            - "Supplier quality agreement"
            - "Annual performance data review"
      outcome:
        type: enum
        required: true
        values: [Approved, Conditional, Rejected]
        description: >
          Approved = supplier meets all qualification requirements.
          Conditional = approved with specific limitations or improvement requirements.
          Rejected = supplier did not meet requirements; may lead to suspension.
      corrective_action_required:
        type: boolean
        required: false
        default: false
        description: Whether a corrective action was required as a result of this event
      corrective_action_description:
        type: string
        required: false
        description: Description of required corrective action (if applicable)
      next_review_date:
        type: date
        required: false
        description: Date the next scheduled qualification review is due
      approval_status_after:
        type: enum
        required: false
        values: [Active, Conditional, Suspended, Disqualified]
        description: >
          The supplier's approval status resulting from this event.
          Captures the state change for audit trail purposes.

    relationships:
      applies_to_supplier:
        target: supplier
        cardinality: many-to-one
        description: The supplier this qualification event records
      performed_by_user:
        target: user
        cardinality: many-to-one
        nullable: true
        description: the manufacturer user who performed the qualification review
