# schemas/supplier.yaml
#
# Layer-1 coverage: None. A supplier contact record has no Layer-1 analog in STEP,
#   QIF, MTConnect, or X12. X12 850/856 carry supplier identification as N1/N2/N3/N4
#   segments (name, address), but those are transaction-scoped — not persistent records.
#
# Layer-2 (Manufacturer Extension): The bare contact and capability record for a supplier (outside
#   processor, material vendor, or services supplier). Renamed from `vendor` per Decision 1.3
#   (vendor → supplier cascade). The supplier entity is the contact/address/capability
#   record; the full qualification data (Nadcap certs, customer approvals, audit history)
#   lives in approved_supplier_list_entry (one-to-one or one-to-many per process scope).
#
# Design note — supplier vs approved_supplier_list_entry:
#   supplier = "who are they, how do we reach them, what can they do"
#   approved_supplier_list_entry = "are they qualified to work our jobs, for which specs,
#     by which customers, with what ITAR status"
#   This split follows Archetype B's separation of contact data from qualification data.
#
# Prose source: extensions/outside-processing.md (Supplier section),
#               extensions/supplier-approval.md (field references)
# Cluster: Supply Chain (Phase 2.E)
# Sibling schemas: schemas/approved_supplier_list_entry.yaml,
#                  schemas/nadcap_certification.yaml,
#                  schemas/outside_process_operation.yaml

entities:

  supplier:
    description: >
      The contact, address, and process-capability record for a supplier. Covers outside
      processors (heat treat, plating, NDT, etc.), material vendors, and other sub-tier
      entities. Named supplier per Decision 1.3 (renamed from vendor).
      Structured qualification data (Nadcap certs, customer approvals, ITAR status,
      audit history) is in approved_supplier_list_entry; this record is the contact
      anchor all other supplier entities link to.
    attributes:
      id:
        type: uuid
        required: true
        description: UUID v4, minted when supplier record is created in the production system
      name:
        type: string
        required: true
        description: Legal company name
      cage_code:
        type: string
        required: false
        description: Commercial and Government Entity code (DoD / SAM.gov)
      duns_number:
        type: string
        required: false
        description: Dun & Bradstreet DUNS number (legacy; DUNS replaced by UEI in some systems)
      uei:
        type: string
        required: false
        description: SAM.gov Unique Entity Identifier (replaced DUNS as of April 2022)
      address_line1:
        type: string
        required: false
      address_line2:
        type: string
        required: false
      city:
        type: string
        required: false
      state:
        type: string
        required: false
        description: US state abbreviation or international region
      postal_code:
        type: string
        required: false
      country:
        type: string
        required: false
        description: ISO 3166-1 alpha-2 country code
      phone:
        type: string
        required: false
      email:
        type: string
        required: false
      primary_contact:
        type: string
        required: false
        description: Name of primary point of contact at the supplier
      website:
        type: string
        required: false
      process_categories:
        type: array
        required: false
        description: High-level categories of work this supplier performs
        items:
          type: enum
          values:
            [HeatTreat, ChemProcess, Plating, Coating, NDT, Welding, Machining, RawMaterial, Services, Other]
      process_specs_approved:
        type: array
        required: false
        description: Specific process specifications this supplier is approved to run (all customers/contexts)
        items:
          spec_id:
            type: uuid
            required: false
            description: "FK → process_specification.id"
          supplier_procedure:
            type: string
            required: false
            description: Supplier's internal procedure number for this spec
      itar_registered:
        type: boolean
        required: false
        default: false
        description: >
          Whether supplier holds DoS DDTC ITAR registration (required to process
          ITAR-controlled articles). Verified via DDTC registration confirmation.
      preferred:
        type: boolean
        required: false
        default: false
        description: >
          Whether the manufacturer has designated this supplier as preferred (ranked higher during
          vendor selection when multiple eligible options exist).
      status:
        type: enum
        required: true
        values: [Active, Inactive, Suspended, Disqualified]
        description: >
          Active = fully qualified and in use.
          Inactive = not currently used but not disqualified.
          Suspended = temporarily blocked; reason documented in approved_supplier_list_entry.
          Disqualified = permanently removed from approved list.
      notes:
        type: string
        required: false

    relationships:
      has_asl_entry:
        target: approved_supplier_list_entry
        cardinality: one-to-many
        description: The qualification records for this supplier (one per approval scope or context)
      has_nadcap_certs:
        target: nadcap_certification
        cardinality: one-to-many
        description: Nadcap accreditation certificates held by this supplier
      has_qualification_events:
        target: supplier_qualification_event
        cardinality: one-to-many
        description: Audit-trail events recording qualification actions for this supplier
      fulfills_outside_process_ops:
        target: outside_process_operation
        cardinality: one-to-many
        description: Outside process operations assigned to this supplier
