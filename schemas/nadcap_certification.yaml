# schemas/nadcap_certification.yaml
#
# Layer-1 coverage: None. Nadcap certificates are PRI-administered documents with no
#   Layer-1 standard schema. The certificate content (category, number, dates, subscribers,
#   scope) is PRI-defined and publicly verifiable via eAuditNet.
#
# Layer-2 (Manufacturer Extension): Promoted to standalone entity from the embedded
#   nadcap_accreditations[] array inside approved_supplier_list_entry. Standalone because:
#   (1) a single nadcap_certification may be referenced by multiple parts of the system
#       (approved_supplier_list_entry, outside_process_operation vendor selection,
#        quality_flowdown_plan nadcap_required checks);
#   (2) UUID makes expiration monitoring queries possible without denormalization;
#   (3) scope_detail (the specific materials/specs covered) is structurally important for
#       correct vendor selection, not just an annotation.
#
# Prose source: extensions/supplier-approval.md (Nadcap Scope and eAuditNet section)
# Cluster: Supply Chain (Phase 2.E)
# Sibling schemas: schemas/nadcap_category.yaml,
#                  schemas/approved_supplier_list_entry.yaml,
#                  schemas/supplier.yaml

entities:

  nadcap_certification:
    description: >
      A Nadcap accreditation certificate issued to a supplier for a specific process category.
      Certifies that the supplier's processes for that category have been audited and approved
      by PRI. Certificates have expiration dates and scopes that constrain which
      specifications and materials the supplier is approved to process. Referenced by
      approved_supplier_list_entry and evaluated during outside process vendor selection.
    attributes:
      id:
        type: uuid
        required: true
        description: UUID v4, minted when cert record is entered in the manufacturer system
      supplier_id:
        type: uuid
        required: true
        description: "FK → supplier.id — the supplier holding this certification"
      category_id:
        type: uuid
        required: true
        description: "FK → nadcap_category.id — the process category this cert covers"
      category_code:
        type: string
        required: true
        description: >
          Denormalized Nadcap category short code for direct use without FK resolution.
          Must match nadcap_category.category_code of the referenced category_id.
        examples: ["HT", "CP", "NDT", "WLD", "CT"]
      certificate_number:
        type: string
        required: true
        description: PRI-issued certificate number (found on eAuditNet)
      issue_date:
        type: date
        required: true
        description: Date the certificate was issued (most recent audit approval)
      expiration_date:
        type: date
        required: true
        description: >
          Date the certificate expires. Varies by prime subscriber requirements;
          typically 12–18 months from issue. Operations requiring Nadcap must verify
          expiration_date > today before PO issuance.
      audit_body:
        type: string
        required: false
        default: "PRI / Nadcap"
        description: Name of the organization that conducted the audit
      primes_subscribing:
        type: array
        required: false
        description: >
          Prime contractors that have subscribed to this specific audit on eAuditNet.
          A subscribing prime accepts the Nadcap audit result for their supply chain.
          Must be verified when a job requires a specific prime's approval (e.g., Lockheed ASL).
        items:
          type: string
          examples: ["Lockheed Martin", "Boeing", "Pratt & Whitney"]
      scope_detail:
        type: string
        required: false
        description: >
          Free-text description of the specific scope: which materials, specifications,
          and conditions are covered. A Nadcap HT cert covering only aluminum per AMS 2770
          does NOT cover 17-4 PH to H1025 per AMS 2759/3 — the scope must match the job.
        examples:
          - "Aluminum alloys per AMS 2770; AMS 2771"
          - "PH Corrosion Resistant Steel per AMS 2759/3 (H925, H1025, H1075, H1150)"
          - "FPI per ASTM E1417 / AMS 2647; fluorescent penetrant Type I, Level 3"
      eauditnet_url:
        type: string
        required: false
        description: Direct link to this certificate on eAuditNet for verification
      file_reference:
        type: string
        required: false
        description: Path or URL to the certificate PDF stored in the manufacturer systems
      last_verified_date:
        type: date
        required: false
        description: Date the manufacturer last verified this certificate against eAuditNet
      status:
        type: enum
        required: true
        values: [Active, Expired, Suspended, Revoked]
        description: >
          Active = cert is valid and within expiration date.
          Expired = expiration_date has passed; renewal in progress or needed.
          Suspended = PRI has suspended the certification (audit finding or CAPA required).
          Revoked = PRI has revoked the certification.

    relationships:
      held_by_supplier:
        target: supplier
        cardinality: many-to-one
        description: The supplier this certification belongs to
      covers_category:
        target: nadcap_category
        cardinality: many-to-one
        description: The process category this certification covers
      listed_on_asl_entry:
        target: approved_supplier_list_entry
        cardinality: one-to-many
        description: Approved supplier list entries that reference this certification
