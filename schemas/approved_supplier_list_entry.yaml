# schemas/approved_supplier_list_entry.yaml
#
# Layer-1 coverage: None. Approved supplier list management has no Layer-1 standard
#   schema. AS9100 Rev D §8.4 requires documented evaluation and selection criteria;
#   AS9100 does not specify the data structure. Nadcap scope data format follows PRI
#   conventions, not an industry data standard.
#
# Layer-2 (Manufacturer Extension): the manufacturer's qualification record for a supplier. One record per
#   supplier (linked to supplier.id) capturing the full qualification state:
#   Nadcap certifications (by category, referenced as nadcap_certification.id[]),
#   customer approvals (per customer and scope), shop internal qualification outcome,
#   ITAR registration, insurance, and performance rating.
#   Renamed from approved_vendor_list_entry per Decision 1.3 (vendor → supplier cascade).
#   Archetype B display name "[Supplier Approval]" is an alias for this entity.
#
# Design note — nadcap_accreditations:
#   Instead of embedding Nadcap cert fields (as in the prose YAML in supplier-approval.md),
#   this schema references nadcap_certification.id[]. nadcap_certification is a standalone
#   entity (schemas/nadcap_certification.yaml) with its own UUID, expiration date, and
#   eAuditNet-verifiable scope. This enables independent expiration queries without
#   parsing embedded arrays.
#
# Prose source: extensions/supplier-approval.md (Approved Supplier List Entry section)
# Cluster: Supply Chain (Phase 2.E)
# Sibling schemas: schemas/supplier.yaml, schemas/nadcap_certification.yaml,
#                  schemas/customer_asl.yaml

entities:

  approved_supplier_list_entry:
    description: >
      the manufacturer's qualification record for a specific supplier. Captures the full approval
      state: Nadcap certifications, customer approvals, shop internal qualification,
      ITAR status, quality system certifications, and performance rating. One entry per
      supplier; the entry is updated as Nadcap certs are renewed, customer approvals change,
      or performance events occur. Renamed from approved_vendor_list_entry per Decision 1.3.
      Archetype B refers to this as "[Supplier Approval]".
    attributes:
      id:
        type: uuid
        required: true
        description: UUID v4, minted when supplier is first qualified in the production system
      supplier_id:
        type: uuid
        required: true
        description: "FK → supplier.id — the supplier this record qualifies"
      supplier_name:
        type: string
        required: true
        description: Denormalized supplier name for display without FK resolution
      cage_code:
        type: string
        required: false
        description: Denormalized CAGE code
      duns_number:
        type: string
        required: false
      # Location (denormalized from supplier for ASL display)
      city:
        type: string
        required: false
      state:
        type: string
        required: false
      country:
        type: string
        required: false
        description: ISO 3166-1 alpha-2
      # ITAR / Export Control
      itar_registered:
        type: boolean
        required: true
        default: false
        description: Whether supplier holds DoS DDTC ITAR registration
      itar_registration_number:
        type: string
        required: false
        description: DoS DDTC registration number
      itar_registration_expiration:
        type: date
        required: false
        description: ITAR registration expiration date (annual renewal with DDTC)
      foreign_national_access:
        type: boolean
        required: false
        default: false
        description: >
          Whether foreign nationals have access to the supplier's facility.
          If true, the manufacturer compliance officer must approve use for ITAR-controlled jobs.
      # Quality System
      iso_9001_certified:
        type: boolean
        required: false
        default: false
      as9100_certified:
        type: boolean
        required: false
        default: false
      as9100_certificate_number:
        type: string
        required: false
      as9100_registrar:
        type: string
        required: false
        description: "Registrar that issued AS9100 cert (e.g., 'Bureau Veritas', 'DNV')"
      as9100_expiration:
        type: date
        required: false
      # Nadcap Accreditations (references to standalone nadcap_certification entities)
      nadcap_certification_ids:
        type: array
        required: false
        description: >
          FK references → nadcap_certification.id[]. Each nadcap_certification record
          carries the category, certificate number, dates, subscribers, and scope detail.
          Expiration queries run against the nadcap_certification table directly.
        items:
          type: uuid
      # Process Capabilities
      process_capabilities:
        type: array
        required: false
        description: Specific process scopes this supplier is qualified to perform
        items:
          process_category:
            type: enum
            required: true
            values: [HeatTreat, ChemProcess, Plating, Coating, NDT, Welding, Other]
          process_spec_id:
            type: uuid
            required: false
            description: "FK → process_specification.id"
          conditions_approved:
            type: array
            required: false
            description: "Specific conditions approved (e.g., ['H1025', 'H900', 'H1150'])"
            items:
              type: string
          material_families:
            type: array
            required: false
            description: "Material families approved (e.g., ['PH Stainless', 'Aluminum', 'Titanium'])"
            items:
              type: string
      # Customer-Specific Approvals
      customer_approvals:
        type: array
        required: false
        description: >
          Records of customer approval status for specific process scopes.
          Cross-references customer_asl.entries[]; this is the manufacturer's per-vendor verification record.
        items:
          customer_id:
            type: uuid
            required: true
            description: "FK → customer.id"
          customer_name:
            type: string
            required: false
            description: Denormalized customer name
          approval_number:
            type: string
            required: false
            description: Customer's internal APL entry number
          approval_scope:
            type: string
            required: false
            description: What the supplier is approved for under this customer's ASL
          approval_date:
            type: date
            required: false
          expiration_date:
            type: date
            required: false
          verification_source:
            type: string
            required: false
            description: "How the manufacturer verified (e.g., 'Customer portal 2025-01-15', 'ASL document Rev C')"
          last_verified_date:
            type: date
            required: false
      # the manufacturer Internal Qualification
      ffm_approval_date:
        type: date
        required: false
      ffm_approval_type:
        type: enum
        required: false
        values: [Survey, Document_Review, Third_Party_Audit, Customer_Directed]
        description: Method used for the manufacturer's internal qualification
      ffm_quality_agreement:
        type: boolean
        required: false
        default: false
        description: Whether a quality agreement is on file with this supplier
      ffm_quality_agreement_date:
        type: date
        required: false
      ffm_approved_by:
        type: string
        required: false
        description: the manufacturer quality person who approved the supplier
      ffm_performance_rating:
        type: enum
        required: false
        values: [Preferred, Approved, Conditional, Probation, Suspended]
        description: >
          Current performance classification.
          Preferred = top tier; ranked first in vendor selection.
          Approved = standard approved status.
          Conditional = approved with limitations or improvement requirements.
          Probation = active performance concern; monitored closely.
          Suspended = blocked from new POs; pending corrective action or review.
      ffm_performance_notes:
        type: string
        required: false
        description: Narrative on current performance status
      # Insurance / Commercial
      insurance_verified:
        type: boolean
        required: false
        default: false
      insurance_expiration:
        type: date
        required: false
      payment_terms:
        type: string
        required: false
        description: "Net payment terms (e.g., 'Net 30', 'Net 45')"
      # Status
      status:
        type: enum
        required: true
        values: [Active, Inactive, Suspended, Disqualified]
      suspension_reason:
        type: string
        required: false
      suspension_date:
        type: date
        required: false

    relationships:
      qualifies_supplier:
        target: supplier
        cardinality: many-to-one
        description: The supplier this record qualifies
      references_nadcap_certs:
        target: nadcap_certification
        cardinality: one-to-many
        description: Nadcap certifications associated with this approval record
      approved_for_customer:
        target: customer
        cardinality: one-to-many
        description: Customers that have approved this supplier (via customer_approvals[])
