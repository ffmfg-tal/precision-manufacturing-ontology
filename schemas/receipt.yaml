# schemas/receipt.yaml
#
# Layer-1 coverage: None. A goods-received event has no Layer-1 standard analog in STEP,
#   QIF, MTConnect, or X12. X12 861 (Receiving Advice) acknowledges receipt but is
#   not universally used and does not capture the inspection event or cert verification.
#
# Layer-2 (Manufacturer Extension): The goods-received event for an inbound shipment. Distinct
#   from shipment (which tracks logistics/transit) — receipt is the production system event that
#   triggers inventory movement, receiving inspection, and cert collection. One receipt
#   per inbound shipment; a receipt may cover multiple PO lines and may link to multiple
#   inspection events (one per item type or lot).
#
# Prose source: extensions/outside-processing.md (Return and Receiving workflow section),
#               extensions/material-certs.md (cert collection at receiving)
# Cluster: Supply Chain (Phase 2.E)
# Sibling schemas: schemas/shipment.yaml, schemas/purchase_order.yaml

entities:

  receipt:
    description: >
      The goods-received record created when an inbound shipment arrives at the shop.
      Captures the physical receiving event: quantities received, receiver identity,
      inspection event references (PMI, dimensional), and certs included with the delivery.
      A receipt triggers: (1) inventory movement in the production system, (2) cert document logging
      for material lots, (3) PMI and receiving inspection for raw material, (4) job
      status update for outside process returns. Distinct from shipment (the in-transit
      logistics record) — receipt is the dock-side event, shipment is the carrier record.
    attributes:
      id:
        type: uuid
        required: true
        description: UUID v4, minted when receiving record is created in the production system
      shipment_id:
        type: uuid
        required: false
        nullable: true
        description: "FK → shipment.id — the inbound shipment this receipt acknowledges"
      purchase_order_id:
        type: uuid
        required: true
        description: "FK → purchase_order.id — the PO this receipt closes out"
      received_date:
        type: date
        required: true
        description: Date goods were received at the shop dock
      received_time:
        type: string
        required: false
        description: "Time of receipt (ISO 8601 time string: HH:MM)"
      receiver_user_id:
        type: uuid
        required: false
        description: "FK → user.id — the manufacturer employee who received the goods"
      # What was received
      quantities_received:
        type: array
        required: true
        description: Line-by-line receiving quantities against PO line items
        items:
          po_line_number:
            type: integer
            required: true
            description: PO line item this quantity row corresponds to
          quantity_ordered:
            type: number
            required: false
            description: Quantity on the PO line (for comparison)
          quantity_received:
            type: number
            required: true
          unit_of_measure:
            type: string
            required: true
          lot_or_serial:
            type: string
            required: false
            description: Lot number or serial numbers received on this line
          condition:
            type: enum
            required: false
            values: [Acceptable, Damaged, Short, Overage, Wrong_Item]
          notes:
            type: string
            required: false
      # Certs received with the delivery
      certs_included:
        type: array
        required: false
        description: >
          Certification documents received with this delivery.
          For material receipts: MTR, CoC, DFARS declaration.
          For outside process returns: process CoC, process chart.
        items:
          cert_id:
            type: uuid
            required: false
            description: "FK → certification_document.id or process_certification.id (after logging)"
          cert_type_label:
            type: string
            required: true
            description: "Type label for display before cert is logged (e.g., 'MTR', 'CoC', 'Process Chart')"
          cert_document_number:
            type: string
            required: false
            description: Cert document number from the issuer
          cert_received:
            type: boolean
            required: true
            default: false
          cert_acceptable:
            type: boolean
            required: false
            nullable: true
            description: Whether the cert was reviewed and found acceptable; null = not yet reviewed
      # Inspection events
      inspection_event_ids:
        type: array
        required: false
        description: >
          FK[] → inspection_event.id — inspection events triggered by this receipt.
          For raw material: PMI event UUID. For dimensional receiving inspection: inspection event UUID.
        items:
          type: uuid
      # Material lot linkage
      material_lot_ids:
        type: array
        required: false
        description: "FK[] → material_lot.id — material lots created or updated by this receipt"
        items:
          type: uuid
      # Outside process linkage
      outside_process_op_id:
        type: uuid
        required: false
        nullable: true
        description: "FK → outside_process_operation.id — the OP returned by this receipt (outside process returns only)"
      # Discrepancy
      discrepancy_found:
        type: boolean
        required: false
        default: false
        description: Whether any quantity discrepancy, damage, or cert issue was found
      discrepancy_description:
        type: string
        required: false
      ncr_id:
        type: uuid
        required: false
        nullable: true
        description: "FK → nonconformance_report.id — NCR created if receiving inspection failed"

    relationships:
      acknowledges_shipment:
        target: shipment
        cardinality: many-to-one
        nullable: true
        description: The inbound shipment this receipt acknowledges
      closes_purchase_order:
        target: purchase_order
        cardinality: many-to-one
        description: The PO this receipt fulfills (partial or complete)
      received_by_user:
        target: user
        cardinality: many-to-one
        nullable: true
        description: the manufacturer user who received the goods
      creates_material_lots:
        target: material_lot
        cardinality: one-to-many
        nullable: true
        description: Material lots created or updated by this receipt
      triggers_ncr:
        target: nonconformance_report
        cardinality: many-to-one
        nullable: true
        description: NCR created if receiving inspection found nonconformance
      returns_outside_process_op:
        target: outside_process_operation
        cardinality: many-to-one
        nullable: true
        description: The outside process operation returned by this receipt
